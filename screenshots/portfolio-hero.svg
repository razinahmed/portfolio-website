<svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <!-- Main gradient background -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a3e;stop-opacity:1" />
    </linearGradient>

    <!-- Glow effect for name -->
    <radialGradient id="nameGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#4ecdc4;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#4ecdc4;stop-opacity:0" />
    </radialGradient>

    <!-- Primary button gradient -->
    <linearGradient id="btnPrimary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ecdc4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#44b8b0;stop-opacity:1" />
    </linearGradient>

    <!-- Glassmorphism effect for nav -->
    <filter id="glassEffect">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" />
    </filter>

    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Cursor blink animation -->
    <style>
      @keyframes blink {
        0%, 49% { opacity: 1; }
        50%, 100% { opacity: 0; }
      }
      .cursor {
        animation: blink 1s infinite;
      }
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-20px); }
      }
      .floating-shape {
        animation: float 6s ease-in-out infinite;
      }
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .content-text {
        animation: fadeInUp 0.8s ease-out forwards;
      }
      .delay-1 { animation-delay: 0.1s; }
      .delay-2 { animation-delay: 0.3s; }
      .delay-3 { animation-delay: 0.5s; }
      .delay-4 { animation-delay: 0.7s; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="700" fill="url(#bgGradient)"/>

  <!-- Floating geometric wireframe shapes in background -->
  <!-- Icosahedron (simplified wireframe) -->
  <g class="floating-shape" opacity="0.08" transform="translate(1050, 150)">
    <polygon points="0,-50 50,-20 30,40 -30,40 -50,-20" stroke="#4ecdc4" stroke-width="1.5" fill="none"/>
    <line x1="0" y1="-50" x2="50" y2="-20" stroke="#4ecdc4" stroke-width="1.5"/>
    <line x1="0" y1="-50" x2="-50" y2="-20" stroke="#4ecdc4" stroke-width="1.5"/>
    <line x1="50" y1="-20" x2="30" y2="40" stroke="#4ecdc4" stroke-width="1.5"/>
    <line x1="-50" y1="-20" x2="-30" y2="40" stroke="#4ecdc4" stroke-width="1.5"/>
  </g>

  <!-- Torus (simplified wireframe) -->
  <g class="floating-shape" opacity="0.06" transform="translate(150, 500)" style="animation-delay: 2s;">
    <circle cx="0" cy="0" r="40" stroke="#667eea" stroke-width="1.5" fill="none"/>
    <circle cx="0" cy="0" r="60" stroke="#667eea" stroke-width="1.5" fill="none"/>
    <ellipse cx="0" cy="0" rx="50" ry="30" stroke="#667eea" stroke-width="1.5" fill="none"/>
  </g>

  <!-- Particle dots background -->
  <g opacity="0.4">
    <circle cx="150" cy="100" r="1.5" fill="#4ecdc4"/>
    <circle cx="280" cy="150" r="1" fill="#667eea"/>
    <circle cx="450" cy="80" r="1.2" fill="#4ecdc4"/>
    <circle cx="620" cy="200" r="1" fill="#667eea"/>
    <circle cx="800" cy="120" r="1.5" fill="#4ecdc4"/>
    <circle cx="950" cy="180" r="1" fill="#667eea"/>
    <circle cx="1050" cy="80" r="1.2" fill="#4ecdc4"/>
    <circle cx="200" cy="400" r="1" fill="#667eea"/>
    <circle cx="400" cy="450" r="1.5" fill="#4ecdc4"/>
    <circle cx="650" cy="500" r="1" fill="#667eea"/>
    <circle cx="850" cy="480" r="1.2" fill="#4ecdc4"/>
    <circle cx="1100" cy="550" r="1" fill="#667eea"/>
    <circle cx="100" cy="600" r="1.5" fill="#4ecdc4"/>
    <circle cx="350" cy="650" r="1" fill="#667eea"/>
    <circle cx="700" cy="620" r="1.2" fill="#4ecdc4"/>
    <circle cx="920" cy="680" r="1" fill="#667eea"/>
  </g>

  <!-- Subtle glow behind name area -->
  <ellipse cx="600" cy="350" rx="300" ry="200" fill="url(#nameGlow)"/>

  <!-- Navigation Bar with Glassmorphism effect -->
  <rect x="0" y="0" width="1200" height="80" fill="#0a0a1a" opacity="0.7" filter="url(#glassEffect)"/>
  <rect x="0" y="0" width="1200" height="1" fill="#4ecdc4" opacity="0.2"/>

  <!-- Logo/Brand Name -->
  <text x="50" y="48" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="24" font-weight="bold" fill="#f8f9fa">
    Abdul Rasak V
  </text>

  <!-- Navigation Links -->
  <text x="750" y="48" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="14" fill="#b0b8d4" letter-spacing="2">
    <tspan>Home</tspan>
    <tspan x="810" dy="0"> | </tspan>
    <tspan x="825" dy="0">About</tspan>
    <tspan x="890" dy="0"> | </tspan>
    <tspan x="905" dy="0">Skills</tspan>
    <tspan x="965" dy="0"> | </tspan>
    <tspan x="980" dy="0">Projects</tspan>
    <tspan x="1055" dy="0"> | </tspan>
    <tspan x="1070" dy="0">Contact</tspan>
  </text>

  <!-- Moon Icon (Dark Mode Toggle) -->
  <g transform="translate(1150, 40)">
    <circle cx="0" cy="0" r="14" fill="none" stroke="#b0b8d4" stroke-width="2" opacity="0.7"/>
    <circle cx="0" cy="0" r="8" fill="#0a0a1a" stroke="#4ecdc4" stroke-width="1.5"/>
  </g>

  <!-- Main Content Area -->
  <!-- "Hello, I'm" text -->
  <text x="600" y="250" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="18" fill="#b0b8d4" text-anchor="middle" class="content-text delay-1">
    Hello, I'm
  </text>

  <!-- Large Name Text -->
  <text x="600" y="340" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="72" font-weight="900" fill="#f8f9fa" text-anchor="middle" class="content-text delay-2" filter="url(#glow)">
    Abdul Rasak V
  </text>

  <!-- Typing Animation with Role -->
  <text x="600" y="410" font-family="'Courier New', monospace" font-size="32" fill="#b0b8d4" text-anchor="middle" class="content-text delay-3">
    <tspan fill="#4ecdc4" font-weight="bold">Full Stack Developer</tspan><tspan fill="#4ecdc4">|</tspan>
  </text>

  <!-- Blinking Cursor -->
  <rect x="625" y="390" width="3" height="35" fill="#4ecdc4" class="cursor content-text delay-3"/>

  <!-- Tagline -->
  <text x="600" y="460" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="16" fill="#8b92b8" text-anchor="middle" class="content-text delay-4">
    Building digital experiences from the UAE
  </text>

  <!-- Buttons -->
  <!-- View Projects Button (Filled) -->
  <g class="content-text delay-4">
    <rect x="420" y="510" width="160" height="54" rx="8" fill="url(#btnPrimary)" stroke="#4ecdc4" stroke-width="2"/>
    <text x="500" y="545" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="16" font-weight="600" fill="#0a0a1a" text-anchor="middle">
      View Projects
    </text>
  </g>

  <!-- Contact Me Button (Outlined) -->
  <g class="content-text delay-4">
    <rect x="620" y="510" width="160" height="54" rx="8" fill="none" stroke="#4ecdc4" stroke-width="2"/>
    <text x="700" y="545" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="16" font-weight="600" fill="#4ecdc4" text-anchor="middle">
      Contact Me
    </text>
  </g>

  <!-- Decorative line accent below buttons -->
  <line x1="450" y1="590" x2="750" y2="590" stroke="#4ecdc4" stroke-width="1" opacity="0.3"/>

  <!-- Small decorative elements -->
  <circle cx="1150" cy="150" r="2" fill="#4ecdc4" opacity="0.6"/>
  <circle cx="100" cy="250" r="1.5" fill="#667eea" opacity="0.5"/>
  <circle cx="1170" cy="650" r="2" fill="#667eea" opacity="0.6"/>
</svg>